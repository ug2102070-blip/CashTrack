name: cashtrack
description: Professional Personal Finance Tracker for Bangladesh
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  flutter_hooks: ^0.21.3+1
  hooks_riverpod: ^2.4.9

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  cloud_functions: ^6.0.1
  firebase_storage: ^13.0.6
  firebase_analytics: ^12.1.1

  # Navigation
  go_router: ^17.0.1

  # UI & Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1

  # Charts
  fl_chart: ^1.1.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.3.3
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # SMS & Permissions
  flutter_sms_inbox: ^1.0.3
  permission_handler: ^12.0.1

  # Security
  local_auth: ^3.0.0
  flutter_secure_storage: ^10.0.0

  # Images & Files
  image_picker: ^1.0.7
  file_picker: ^10.3.8
  path_provider: ^2.1.2

  # Voice
  speech_to_text: ^7.3.0
  flutter_tts: ^4.0.2

  # Export
  pdf: ^3.10.7
  csv: ^6.0.0
  excel: ^4.0.2
  share_plus: ^12.0.1

  # Network
  dio: ^5.4.0
  connectivity_plus: ^7.0.0

  # Background
  workmanager: ^0.9.0+3
  flutter_local_notifications: ^20.0.0
  timezone: ^0.10.1

  # Calendar
  table_calendar: ^3.0.9

  # Others
  url_launcher: ^6.2.3
  package_info_plus: ^9.0.0
  device_info_plus: ^12.3.0
  confetti: ^0.8.0
  flutter_slidable: ^4.0.3
  cached_network_image: ^3.3.1

  google_generative_ai: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

  # App Icon
  flutter_launcher_icons: ^0.14.3

  # Splash Screen
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

    - family: BalooDa2
      fonts:
        - asset: assets/fonts/BalooDa2-Regular.ttf
        - asset: assets/fonts/BalooDa2-Bold.ttf
          weight: 700

    - family: NotoSansBengali
      fonts:
        - asset: assets/fonts/NotoSansBengali-Var.ttf

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/app_icon.png
  color_dark: "#1B1F23"
  image_dark: assets/images/app_icon.png
  android_12:
    color: "#FFFFFF"
    image: assets/images/app_icon.png
    color_dark: "#1B1F23"
    image_dark: assets/images/app_icon.png
